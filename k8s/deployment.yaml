apiVersion: apps/v1
kind: Deployment
metadata:
  name: library-system
  namespace: library-system

spec:
  replicas: 2

  selector:
    matchLabels:
      app: library-system

  template:
    metadata:
      labels:
        app: library-system

    spec:
      containers:
        - name: library-system
          image: library-system:v1
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

            # ✅ CORRECT SPRING BOOT MAPPING
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: url

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: username

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          