name: Library System CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout Repository
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # Setup Java 17
      # =========================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # =========================
      # Run Unit Tests
      # =========================
      - name: Run Tests
        run: mvn clean test

      # =========================
      # Build Application
      # =========================
      - name: Build JAR
        run: mvn clean package -DskipTests

      # =========================
      # Upload Artifact
      # =========================
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: library-system
          path: target/*.jar