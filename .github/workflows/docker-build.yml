name: Docker Build & Push (GitOps)

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
      - "helm/**"

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USER }}/library-system

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout code
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # Setup Java 17
      # =========================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # Build JAR
      # =========================
      - name: Build Spring Boot App
        run: mvn clean package -DskipTests

      # =========================
      # Docker login
      # =========================
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      # =========================
      # Build Docker image (VERSIONED)
      # =========================
      - name: Build Docker Image
        run: |
          docker build -t $DOCKER_IMAGE:${{ github.sha }} .

      # =========================
      # Push Docker image
      # =========================
      - name: Push Docker Image
        run: |
          docker push $DOCKER_IMAGE:${{ github.sha }}

      # =========================
      # Update Helm values (GitOps trigger)
      # =========================
      - name: Update Helm values.yaml
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/g" helm/library-system/values.yaml

      # =========================
      # Commit changes back to Git
      # =========================
      - name: Commit Helm update
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add helm/library-system/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}"
          git push