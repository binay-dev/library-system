apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: library-system
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/binay-dev/library-system.git
    targetRevision: main
    path: helm

  destination:
    server: https://kubernetes.default.svc
    namespace: library-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true