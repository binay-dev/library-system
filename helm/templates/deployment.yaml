apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.fullnameOverride | default .Release.Name }}
  labels:
    app.kubernetes.io/name: library-system

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: library-system

  template:
    metadata:
      labels:
        app.kubernetes.io/name: library-system

    spec:
      containers:
        - name: library-system
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 8080

          # =========================
          # ENV VARIABLES
          # =========================
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "{{ .Values.env.SPRING_PROFILES_ACTIVE }}"

            - name: SPRING_DATASOURCE_URL
              value: "{{ .Values.db.SPRING_DATASOURCE_URL }}"

            - name: SPRING_DATASOURCE_USERNAME
              value: "{{ .Values.db.SPRING_DATASOURCE_USERNAME }}"

            - name: SPRING_DATASOURCE_PASSWORD
              value: "{{ .Values.db.SPRING_DATASOURCE_PASSWORD }}"

            - name: SPRING_JPA_PROPERTIES_HIBERNATE_TEMP_USE_JDBC_METADATA_DEFAULTS
              value: "{{ .Values.env.SPRING_JPA_PROPERTIES_HIBERNATE_TEMP_USE_JDBC_METADATA_DEFAULTS }}"

            - name: SPRING_JPA_DATABASE_PLATFORM
              value: "{{ .Values.env.SPRING_JPA_DATABASE_PLATFORM }}"

          # =========================
          # RESOURCES
          # =========================
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          # =========================
          # STARTUP PROBE
          # =========================
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 60
            timeoutSeconds: 5

          # =========================
          # READINESS PROBE
          # =========================
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          # =========================
          # LIVENESS PROBE
          # =========================
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5