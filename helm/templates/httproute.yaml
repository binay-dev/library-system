{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.fullnameOverride | default "library-system" }}-route
  labels:
    app: {{ .Values.fullnameOverride | default "library-system" }}
spec:
  parentRefs:
    {{- range .Values.httpRoute.parentRefs }}
    - name: {{ .name }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
    {{- end }}

  hostnames:
    {{- range .Values.httpRoute.hostnames }}
    - {{ . }}
    {{- end }}

  rules:
    {{- range .Values.httpRoute.rules }}
    - matches:
        {{- range .matches }}
        - path:
            type: {{ .path.type }}
            value: {{ .path.value }}
        {{- end }}

      backendRefs:
        - name: {{ $.Values.fullnameOverride | default "library-system" }}-service
          port: {{ $.Values.service.targetPort }}
    {{- end }}
  {{- end }}