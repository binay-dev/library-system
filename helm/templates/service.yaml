apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.fullnameOverride | default "library-system" }}

  labels:
    app.kubernetes.io/name: library-system

spec:
  type: {{ .Values.service.type }}

  selector:
    app.kubernetes.io/name: library-system

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http